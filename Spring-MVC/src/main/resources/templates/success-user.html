<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Success User</title>
</head>
<body>
	<table>
		<tr th:each="user: ${users}">
			<td th:text="${user.userId}" />
			<td th:text="${user.userName}" />
			<td th:text="${user.userAge}" />
			<td th:text="${user.password}" />
		</tr>
	</table>
	
	<a href="/">HOME</a> <br>
	<a href="/add-user-form">Add User</a> <br>
</body>
</html>
